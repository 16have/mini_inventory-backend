services:
  - type: web
    name: mini-inventory
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    # Run schema migrations before starting the production web server.
    startCommand: flask --app run:app db upgrade && gunicorn --bind 0.0.0.0:$PORT run:app
    healthCheckPath: /api/health
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: mini-inventory-db
          property: connectionString

databases:
  - name: mini-inventory-db
    plan: free
    databaseName: inventory
    user: inventory_user
